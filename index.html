<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D 素材瀏覽器</title>
  </head>
  <body>
    <div id="app">
      <!-- 側欄 -->
      <aside id="sidebar">
        <div class="sb-head">
          <h1>3D 素材庫</h1>
          <button id="btn-rescan" title="重新掃描">⟳</button>
        </div>
        <div class="sb-root" id="root-info"></div>
        <nav id="tree"></nav>
        <button id="btn-pick" class="pick-btn">變更素材庫資料夾…</button>
      </aside>

      <!-- 主區 -->
      <main id="main">
        <header id="topbar">
          <input id="search" type="search" placeholder="搜尋模型名稱…" />
          <div class="filters">
            <label class="fav-filter"><input type="checkbox" id="filter-fav" /> ⭐ 只看最愛</label>
            <label class="fav-filter"><input type="checkbox" id="filter-anim" /> 🎬 只看動畫</label>
            <div class="view-size" id="view-size" title="卡片大小">
              <button data-size="sm">小</button>
              <button data-size="md" class="on">中</button>
              <button data-size="lg">大</button>
            </div>
            <select id="filter-format">
              <option value="">所有格式</option>
              <option value="glb">glb</option>
              <option value="gltf">gltf</option>
              <option value="fbx">fbx</option>
              <option value="obj">obj</option>
              <option value="blend">blend</option>
            </select>
            <button id="btn-delete" class="del-btn" disabled>🗑 刪除選取 (0)</button>
            <button id="btn-clear-sel" class="build-all-btn hidden">清除選取</button>
            <button id="btn-build-all" class="build-all-btn" title="一次把整個素材庫的縮圖都產生好（背景進行，可繼續操作）">⚡ 全部產生縮圖</button>
            <span id="count" class="count"></span>
            <span id="thumb-status" class="thumb-status hidden"></span>
          </div>
        </header>
        <div id="grid"></div>
      </main>
    </div>

    <!-- 3D 檢視器彈窗 -->
    <div id="viewer-overlay" class="hidden">
      <div id="viewer-panel">
        <div id="viewer-canvas-wrap"></div>
        <button id="viewer-close" title="關閉 (Esc)">✕</button>
        <div id="viewer-toolbar">
          <button data-act="wireframe">線框</button>
          <button data-act="grid" class="on">格線</button>
          <button data-act="bg">背景</button>
          <button data-act="reset">重置視角</button>
          <span id="anim-controls" class="hidden">
            <button id="anim-playpause" title="播放/暫停">⏸</button>
            <select id="anim-select" title="動畫片段"></select>
          </span>
        </div>
        <div id="viewer-info">
          <div class="vi-title"><span id="vi-name"></span> <button id="vi-fav" title="加入最愛">☆</button></div>
          <div id="vi-stats" class="vi-stats"></div>
          <div id="vi-formats" class="vi-formats"></div>
          <div id="vi-path" class="vi-path"></div>
          <div class="vi-actions">
            <button id="vi-copy">複製路徑</button>
            <button id="vi-open">外部開啟</button>
            <button id="vi-reveal">在檔案總管顯示</button>
          </div>
        </div>
        <div id="viewer-loading" class="hidden">載入中…</div>
      </div>
    </div>

    <!-- 右鍵選單 -->
    <div id="ctx-menu" class="hidden"></div>

    <!-- 路徑清單彈窗 -->
    <div id="path-list-overlay" class="hidden">
      <div id="path-list-panel">
        <div class="pl-head">
          <span id="pl-title"></span>
          <div class="pl-actions">
            <button id="pl-copy-all">全部複製</button>
            <button id="pl-close">✕</button>
          </div>
        </div>
        <div id="pl-body"></div>
      </div>
    </div>

    <script type="module" src="/src/renderer.js"></script>
  </body>
</html>
